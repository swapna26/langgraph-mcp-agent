# CI/CD Pipeline for LangGraph MCP Agent
# ========================================
# Runs on every push and pull request:
#   1. Lint — checks code style with ruff
#   2. Unit Tests — tests with mocked LLM/DB (fast, no services needed)
#   3. Integration Tests — tests with real PostgreSQL + Ollama in Docker
#   4. Build & Push — builds Docker image and pushes to DockerHub (main only)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # Job 1: Lint (code quality check)
  # ---------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Run ruff formatter check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------
  # Job 2: Unit Tests (mocked — no DB or LLM needed)
  # ---------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/test_sql_rag_server.py -v

  # ---------------------------------------------------------------
  # Job 3: Integration Tests (real PostgreSQL + Ollama)
  # ---------------------------------------------------------------
  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]  # Only run after lint + unit tests pass

    services:
      # PostgreSQL as a Docker service
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
          POSTGRES_DB: agentic_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U raguser -d agentic_rag"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Setup test database tables
        env:
          DATABASE_URL: postgresql://raguser:ragpassword@localhost:5432/agentic_rag
        run: |
          uv run python -c "
          import os, psycopg2
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('CREATE TABLE IF NOT EXISTS conversations (id VARCHAR PRIMARY KEY, user_id VARCHAR, title VARCHAR, created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ DEFAULT NOW(), is_active BOOLEAN DEFAULT TRUE, extra_metadata TEXT)')
          cur.execute('CREATE TABLE IF NOT EXISTS conversation_messages (id VARCHAR PRIMARY KEY, conversation_id VARCHAR REFERENCES conversations(id), role VARCHAR, content TEXT, created_at TIMESTAMPTZ DEFAULT NOW())')
          cur.execute(\"INSERT INTO conversations (id, title) VALUES ('test1', 'Test conversation 1')\")
          cur.execute(\"INSERT INTO conversations (id, title) VALUES ('test2', 'Test conversation 2')\")
          cur.execute(\"INSERT INTO conversations (id, title) VALUES ('test3', 'Test conversation 3')\")
          cur.execute(\"INSERT INTO conversation_messages (id, conversation_id, role, content) VALUES ('m1', 'test1', 'user', 'Hello')\")
          cur.execute(\"INSERT INTO conversation_messages (id, conversation_id, role, content) VALUES ('m2', 'test1', 'assistant', 'Hi there')\")
          conn.close()
          print('Test database setup complete: 3 conversations, 2 messages')
          "

      - name: Start Ollama and pull model
        run: |
          # Install Ollama
          curl -fsSL https://ollama.com/install.sh | sh

          # Start Ollama server in background
          ollama serve &
          sleep 5

          # Pull small model for CI (1.3GB instead of 4.4GB)
          ollama pull llama3.2:1b
          echo "Ollama ready with llama3.2:1b"

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://raguser:ragpassword@localhost:5432/agentic_rag
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_MODEL: llama3.2:1b
        run: uv run pytest tests/test_integration.py -v

  # ---------------------------------------------------------------
  # Job 4: Build & Push Docker Image (only on main branch)
  # ---------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: [integration-tests]          # Only after ALL tests pass
    if: github.ref == 'refs/heads/main' # Only on push to main, not PRs

    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rag-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rag-agent:${{ github.sha }}

  # ---------------------------------------------------------------
  # Job 5: Deploy (pull new image and restart app)
  # ---------------------------------------------------------------
  # In production (Suadeo/Harbor), this would SSH into the server
  # and run: docker compose pull && docker compose up -d
  #
  # For this project, we simulate the deploy step:
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "========================================="
          echo "  DEPLOYMENT READY"
          echo "========================================="
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/rag-agent:${{ github.sha }}"
          echo ""
          echo "To deploy on a production server:"
          echo "  1. SSH into server"
          echo "  2. docker compose pull"
          echo "  3. docker compose up -d"
          echo ""
          echo "To deploy locally:"
          echo "  docker compose up -d"
          echo "========================================="

